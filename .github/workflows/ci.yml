name: CI Pipeline - Analisis de Sentimiento

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar formato con ruff
        run: ruff format --check . --exclude docs/

      - name: Ejecutar linter con ruff
        run: ruff check . --ignore F821 --ignore E722 --exclude docs/

      - name: Ejecutar tests unitarios
        env:
          PYTHONPATH: src
        run: pytest -q -p no:cacheprovider

      - name: Ejecutar cobertura
        env:
          PYTHONPATH: src
        run: pytest --cov --cov-report=term-missing -p no:cacheprovider

      - name: Verificar carpetas requeridas
        run: python scripts/check_folders.py

      - name: Analisis de seguridad con bandit
        run: bandit -r src main.py scripts/check_folders.py