name: CI Pipeline - Analisis de Sentimiento

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar formato con ruff
        run: ruff format --check .

      - name: Ejecutar linter con ruff
        run: ruff check .

      - name: Ejecutar tests unitarios
        env:
          PYTHONPATH: src
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -q -p no:cacheprovider

      - name: Ejecutar cobertura
        env:
          PYTHONPATH: src
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest --cov=src --cov-report=term-missing -p no:cacheprovider

      - name: Verificar carpetas requeridas
        run: python scripts/check_folders.py

      - name: Analisis de seguridad con bandit
        run: bandit -r src main.py scripts/check_folders.py