[coverage:run]
source = src
omit =
    */tests/*
    */src/gui/*
    */src/sentimiento/cliente.py
    */src/menu.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
fail_under = 80